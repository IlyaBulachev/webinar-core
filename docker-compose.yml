version: '3.8' 
 
services: 
  postgres: 
    image: postgres:15-alpine 
    environment: 
      POSTGRES_DB: webinars 
      POSTGRES_USER: admin 
      POSTGRES_PASSWORD: secret 
    volumes: 
      - pgdata:/var/lib/postgresql/data 
    ports: 
      - "5432:5432" 
    networks: 
      - webinar-network 
 
  redis: 
    image: redis:7-alpine 
    ports: 
      - "6379:6379" 
    networks: 
      - webinar-network 
 
  janus: 
    image: canyan/janus-gateway:latest 
    command: ["/opt/janus/bin/janus", "-F", "/opt/janus/etc/janus"] 
    volumes: 
      - ./janus-config/janus.plugin.videoroom.cfg:/opt/janus/etc/janus/janus.plugin.videoroom.jcfg:ro 
    ports: 
      - "7088:7088" 
      - "8188:8188" 
      - "10000-10200:10000-10200/udp" 
    networks: 
      - webinar-network 
 
  server: 
    build: 
      context: ./server 
      dockerfile: Dockerfile 
    environment: 
      PORT: "3000" 
      DATABASE_URL: postgresql://admin:secret@postgres:5432/webinars 
      REDIS_URL: redis://redis:6379 
      JANUS_ADMIN_URL: http://janus:7088/admin 
      JANUS_WS_URL: ws://janus:8188 
      JWT_SECRET: dev-secret 
      CLIENT_ORIGIN: http://localhost 
    depends_on: 
      - postgres 
      - redis 
      - janus 
    ports: 
      - "3000:3000" 
    networks: 
      - webinar-network 
 
  nginx: 
    image: nginx:alpine 
    volumes: 
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro 
    ports: 
      - "80:80" 
    depends_on: 
      - server 
    networks: 
      - webinar-network 
 
networks: 
  webinar-network: 
    driver: bridge 
 
volumes: 
  pgdata: 
